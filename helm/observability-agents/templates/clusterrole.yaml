apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ .Release.Name }}-observability-agents
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/version: {{ .Chart.AppVersion | quote }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
rules:
  # Read access for investigation
  - apiGroups: [""]
    resources:
      - pods
      - pods/log
      - events
      - nodes
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources:
      - deployments
      - replicasets
    verbs: ["get", "list", "watch"]

  # Write access for remediation
  - apiGroups: ["apps"]
    resources:
      - deployments
    verbs: ["patch", "update"]
  - apiGroups: ["apps"]
    resources:
      - deployments/scale
    verbs: ["update"]
