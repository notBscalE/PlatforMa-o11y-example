replicaCount: 2

image:
  repository: ghcr.io/EXAMPLE_REPO
  pullPolicy: Always
  tag: "latest"

imagePullSecrets:
  - name: ghcr-pull-secret

service:
  type: LoadBalancer
  port: 80
  targetPort: 8080

ingress:
  enabled: false

resources:
  requests:
    cpu: 50m
    memory: 32Mi
  limits:
    cpu: 200m
    memory: 128Mi

livenessProbe:
  httpGet:
    path: /health
    port: 8080
  initialDelaySeconds: 5
  periodSeconds: 10

readinessProbe:
  httpGet:
    path: /health
    port: 8080
  initialDelaySeconds: 5
  periodSeconds: 5

serviceMonitor:
  enabled: true
  interval: 30s
  path: /health
  additionalLabels:
    release: kube-prometheus-stack

nodeSelector: {}
tolerations: []
affinity: {}
