name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/platformma
  AGENTS_IMAGE_NAME: ${{ github.repository_owner }}/platformma-agents
  TF_WORKING_DIR: terraform/infra
  AWS_REGION: us-east-1

permissions:
  contents: read
  id-token: write        # required for OIDC
  pull-requests: read    # required for dorny/paths-filter on PRs

jobs:
  # ──────────────────────────────────────────────
  # Detect which directories changed
  # ──────────────────────────────────────────────
  changes:
    runs-on: ubuntu-latest
    outputs:
      app:       ${{ steps.filter.outputs.app }}
      terraform: ${{ steps.filter.outputs.terraform }}
      helm:      ${{ steps.filter.outputs.helm }}
      agents:    ${{ steps.filter.outputs.agents }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            app:
              - 'app/**'
            terraform:
              - 'terraform/**'
            helm:
              - 'helm/platformma-app/**'
              - 'helm/observability-agents/**'
            agents:
              - 'agents/**'

  # ──────────────────────────────────────────────
  # TEST: Helm lint (only when helm/ changed)
  # ──────────────────────────────────────────────
  test-helm:
    needs: changes
    if: needs.changes.outputs.helm == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Lint charts
        run: |
          helm lint helm/platformma-app
          helm lint helm/observability-agents

  # ──────────────────────────────────────────────
  # TEST: Terraform fmt + validate + plan (only when terraform/ changed)
  # ──────────────────────────────────────────────
  test-terraform:
    needs: changes
    if: needs.changes.outputs.terraform == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.TF_WORKING_DIR }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.9"

      - name: Format check
        run: terraform fmt -check -recursive

      - name: Validate (no backend)
        run: |
          terraform init -backend=false
          terraform validate

      - name: Assume AWS role (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Plan
        run: |
          terraform init -reconfigure
          terraform plan -input=false
        env:
          TF_VAR_my_ip:             ${{ secrets.TF_VAR_MY_IP }}
          TF_VAR_anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          TF_VAR_github_token:      ${{ secrets.AGENTS_GITHUB_TOKEN }}

  # ──────────────────────────────────────────────
  # TEST: Agents lint + unit tests (only when agents/ changed)
  # ──────────────────────────────────────────────
  test-agents:
    needs: changes
    if: needs.changes.outputs.agents == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agents
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "agents/uv.lock"

      - name: Install dependencies
        run: uv sync --locked --group dev

      - name: Lint (ruff)
        run: uv run ruff check src/

      - name: Test (pytest)
        run: uv run pytest tests/ -v

  # ──────────────────────────────────────────────
  # TEST: Build + vet + test Go app (whenever app/ changed)
  # ──────────────────────────────────────────────
  test-app:
    needs: changes
    if: needs.changes.outputs.app == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: app/go.mod

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

  # ──────────────────────────────────────────────
  # DEPLOY: Build & push app image (only on main, only when app/ changed)
  # ──────────────────────────────────────────────
  build-and-push:
    needs: [changes, test-helm, test-app]
    if: |
      always() &&
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      needs.changes.outputs.app == 'true' &&
      (needs.test-helm.result == 'success' || needs.test-helm.result == 'skipped') &&
      (needs.test-app.result == 'success' || needs.test-app.result == 'skipped') &&
      !contains(needs.*.result, 'failure')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./app
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ──────────────────────────────────────────────
  # DEPLOY: Build & push agents image (only on main, agents/ changed, tests passed)
  # ──────────────────────────────────────────────
  build-and-push-agents:
    needs: [changes, test-agents]
    if: |
      always() &&
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      needs.changes.outputs.agents == 'true' &&
      (needs.test-agents.result == 'success' || needs.test-agents.result == 'skipped') &&
      !contains(needs.*.result, 'failure')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.AGENTS_IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./agents
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ──────────────────────────────────────────────
  # DEPLOY: Terraform apply + rollout restart (only on main, after tests pass)
  # ──────────────────────────────────────────────
  terraform-apply:
    needs: [changes, build-and-push, build-and-push-agents, test-terraform]
    if: |
      always() &&
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      (needs.build-and-push.result == 'success' || needs.build-and-push.result == 'skipped') &&
      (needs.build-and-push-agents.result == 'success' || needs.build-and-push-agents.result == 'skipped') &&
      (needs.test-terraform.result == 'success' || needs.test-terraform.result == 'skipped') &&
      !contains(needs.*.result, 'failure')
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.TF_WORKING_DIR }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.9"

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Assume AWS role (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Configure kubectl
        run: aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name platformma

      - name: Terraform init
        run: terraform init

      - name: Terraform apply
        run: terraform apply -auto-approve -input=false
        env:
          TF_VAR_my_ip:             ${{ secrets.TF_VAR_MY_IP }}
          TF_VAR_anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          TF_VAR_github_token:      ${{ secrets.AGENTS_GITHUB_TOKEN }}

      - name: Restart app deployment
        if: needs.build-and-push.result == 'success'
        run: |
          kubectl delete pods -n platformma \
            -l app.kubernetes.io/instance=platformma --ignore-not-found

      - name: Restart agents deployment
        if: needs.build-and-push-agents.result == 'success'
        run: |
          kubectl delete pods -n observability-agents \
            -l app.kubernetes.io/instance=observability-agents --ignore-not-found
