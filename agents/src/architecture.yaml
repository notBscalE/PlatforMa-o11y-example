cluster:
  name: platformma
  region: us-east-1
  provider: eks
  node_type: t3.medium
  capacity: spot
  k8s_version: "1.30"
  cloudwatch_log_group: /aws/eks/platformma/cluster

applications:
  - name: platformma-app
    namespace: platformma
    helm_chart: helm/platformma-app
    argocd_app: platformma-app
    health_endpoint: /health
    image_repo: ghcr.io/EXAMPLE_REPO
    port: 8080

monitoring:
  prometheus_url: http://kube-prometheus-stack-prometheus.monitoring.svc.cluster.local:9090
  alertmanager_url: http://kube-prometheus-stack-alertmanager.monitoring.svc.cluster.local:9093
  grafana_url: http://kube-prometheus-stack-grafana.monitoring.svc.cluster.local:80
  namespace: monitoring

argocd:
  url: http://argocd-server.argocd.svc.cluster.local:80
  namespace: argocd

repository:
  url: https://github.com/EXAMPLE_REPO.git
  owner: EXAMPLE_REPO
  name: EXAMPLE_REPO
  main_branch: main
  terraform_dir: terraform/infra
  helm_dir: helm
  app_dir: app
  incidents_dir: incidents

namespaces:
  - platformma
  - argocd
  - monitoring
  - observability-agents
